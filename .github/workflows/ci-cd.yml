name: CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache Next.js build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**/*.ts', 'app/**/*.tsx', '*.js', '*.mjs', '*.ts', '*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment:
      name: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH
        shell: bash
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$EC2_SSH_KEY"
          mkdir -p ~/.ssh
          if printf '%s' "$EC2_SSH_KEY" | grep -q 'BEGIN OPENSSH PRIVATE KEY'; then
            printf '%s' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/github_actions
          else
            printf '%s' "$EC2_SSH_KEY" | tr -d '\r\n ' | base64 -d > ~/.ssh/github_actions
          fi
          chmod 600 ~/.ssh/github_actions
          ssh-keygen -y -f ~/.ssh/github_actions > /dev/null || {
            echo "Invalid EC2_SSH_KEY secret. Store the full OpenSSH private key or its base64-encoded value."
            exit 1
          }

      - name: Deploy application
        shell: bash
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          APP_PORT: ${{ secrets.APP_PORT }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/github_actions "${EC2_USER}@${EC2_HOST}" \
            "bash -lc 'set -euo pipefail; \
            cd \"${APP_DIR}\"; \
            git fetch --all --prune; \
            git checkout master; \
            git pull --ff-only origin master; \
            test \"\$(git rev-parse HEAD)\" = \"${GITHUB_SHA}\"; \
            npm ci; \
            npm run build; \
            pkill -f \"next start\" || true; \
            nohup npm run start -- --hostname 0.0.0.0 --port \"${APP_PORT:-3000}\" > app.log 2>&1 & \
            sleep 5'"

      - name: Verify deployment health
        shell: bash
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/github_actions "${EC2_USER}@${EC2_HOST}" \
            "bash -lc 'curl --fail --silent http://127.0.0.1:${APP_PORT:-3000} > /dev/null'"
