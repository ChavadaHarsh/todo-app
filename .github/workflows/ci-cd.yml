name: CI/CD

on:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint, Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /var/www/todo-app
            git fetch --all
            git checkout master
            git pull --ff-only origin master
            npm ci
            npm run build
            pm2 restart todo-app || pm2 start "npm run start -- --hostname 0.0.0.0 --port 3000" --name todo-app
            pm2 save
