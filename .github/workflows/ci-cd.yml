name: CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Build Application
        run: npm run build

      - name: Write SSH key
        run: |
          printf '%s\n' "$EC2_SSH_KEY" > "$GITHUB_WORKSPACE/ec2_deploy_key"
          chmod 600 "$GITHUB_WORKSPACE/ec2_deploy_key"
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

      - name: Validate SSH key format
        run: |
          ssh-keygen -y -f "$GITHUB_WORKSPACE/ec2_deploy_key" > /dev/null

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key_path: ${{ github.workspace }}/ec2_deploy_key
          port: 22
          script: |
            set -e

            cd /home/ubuntu/app/todo-app

            echo "Pull latest code..."
            git pull --ff-only origin master

            echo "Install dependencies..."
            npm ci

            echo "Build application..."
            npm run build

            echo "Restart PM2..."
            if pm2 describe todo-app > /dev/null; then
              pm2 restart todo-app
            else
              pm2 start npm --name "todo-app" -- start
            fi

            pm2 save

            echo "Deployment completed successfully."
